<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#121212" />
    <meta name="description" content="Offline-first personal cooking journal" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" sizes="any" />
    <title>Cooking Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Cooking <span style="color:var(--accent)">Journal</span></h1>
      <div id="home-controls" class="home-controls">
        <select id="sort-select">
          <option value="random">Random</option>
          <option value="date">Date</option>
          <option value="rating">Rating</option>
          <option value="az">A–Z</option>
        </select>
        <input id="search-input" type="search" placeholder="Search meals..." />
        <select id="ingredient-filter"><option value="">Filter ingredient</option></select>
      </div>
    </header>

    <main id="app"></main>

    <nav class="bottom-nav">
      <button data-tab="home"><span class="icon">🏠</span><span>Home</span></button>
      <button data-tab="add"><span class="icon">➕</span><span>Add Meal</span></button>
      <button data-tab="shopping"><span class="icon">🛒</span><span>Shopping</span></button>
      <button data-tab="settings"><span class="icon">⚙️</span><span>Settings</span></button>
    </nav>

    <dialog id="meal-dialog"></dialog>
    <script src="app.js" defer></script>
  </body>
</html>
