<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f855a" />
    <meta name="description" content="Cookbook PWA starter app" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" sizes="192x192" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <title>Cookbook PWA</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1>🍳 Cookbook PWA</h1>
      <p>This is a Progressive Web App starter you can later package as an Android APK.</p>
      <section>
        <h2>Status</h2>
        <ul>
          <li id="network-status">Checking network...</li>
          <li id="sw-status">Checking service worker...</li>
        </ul>
      </section>
      <button id="install-btn" hidden>Install App</button>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
